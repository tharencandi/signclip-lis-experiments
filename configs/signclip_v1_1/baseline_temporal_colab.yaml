# SignCLIP Baseline Temporal Model - Colab Configuration
#
# This config is designed for Google Colab environments where the repo is cloned to:
# /content/signclip-lis-experiments/
#
# The notebook (tests/collab_zero_shot.ipynb) copies this file to:
# projects/retri/signclip_v1_1/baseline_temporal.yaml
#
# Weights are downloaded to:
# /content/signclip-lis-experiments/runs/signclip_embed/checkpoint_best.pt
#
# Usage: No manual setup needed - the notebook handles everything!

dataset:
  max_video_len: 256
  max_len: 64
  meta_processor: SignCLIPPretrainMetaProcessor
  video_processor: PoseProcessor
  text_processor: TextProcessor
  bert_name: bert-base-cased
  aligner: DSAligner
  pose_components: 'reduced_face'
  augment_temporal: true
  # Dummy paths for Colab - created by notebook
  test_path: /content/signclip-lis-experiments/runs/signclip_embed/dummy_test.txt
  val_path: /content/signclip-lis-experiments/runs/signclip_embed/dummy_val.txt
  train_path: /content/signclip-lis-experiments/runs/signclip_embed/dummy_train.txt
  vfeat_dir: /content/signclip-lis-experiments/runs/signclip_embed

model:
  model_cls: MMFusionSeparate
  mm_encoder_cls: null
  video_encoder_cls: MMBertForEncoder
  text_encoder_cls: BertModel
  num_hidden_video_layers: 12
  vfeat_dim: 609

loss:
  loss_cls: MMContraLoss

eval:
  save_path: /content/signclip-lis-experiments/runs/signclip_embed

fairseq:
  common:
    fp16: true
    tensorboard_logdir: /content/signclip-lis-experiments/runs/signclip_embed
    log_interval: 1000
  dataset:
    num_workers: 4
    batch_size: 1
  checkpoint:
    save_dir: /content/signclip-lis-experiments/runs/signclip_embed
    restore_file: checkpoint_best.pt
    no_epoch_checkpoints: true
  optimization:
    lr: [5.0e-05]
    max_epoch: 25

# SignCLIP SignIT ProLIP fine-tuning configuration for Google Colab

dataset:
  max_video_len: 256
  max_len: 64
  meta_processor: SignCLIPPretrainMetaProcessor
  video_processor: PoseProcessor
  text_processor: TextProcessor
  bert_name: bert-base-cased
  test_path: /content/signclip-lis-experiments/runs/signclip_signit_prolip_finetune/dummy_test.txt
  val_path: /content/signclip-lis-experiments/runs/signclip_signit_prolip_finetune/dummy_val.txt
  train_path: /content/signclip-lis-experiments/runs/signclip_signit_prolip_finetune/dummy_train.txt
  metadata_path: /content/signclip-lis-experiments/runs/signclip_signit_prolip_finetune/dummy_metadata.csv
  vfeat_dir: /content/signclip-lis-experiments/runs/signclip_signit_prolip_finetune
  aligner: DSAligner
  pose_components: 'reduced_face'
  augment_temporal: true

fairseq:
  common:
    fp16: true
    tensorboard_logdir: /content/drive/MyDrive/signclip_signit_prolip_finetune
    log_interval: 1000
  dataset:
    num_workers: 0
    batch_size: 16
  optimization:
    lr:
    - 5.0e-05
    clip_norm: 1.0
    optimizer: adamw
    adam_betas: (0.9, 0.98)
    lr_scheduler: polynomial_decay
    total_num_update: 1000000
    warmup_updates: 50
    weight_decay: 1.0e-04
    ddp_backend: no_c10d
    max_epoch: 100
    prolip_lambda: 0.5
    prolip_lambda_mode: inv_n
  checkpoint:
    no_epoch_checkpoints: true
    reset_optimizer: true
    reset_dataloader: true
    reset_meters: true
    save_dir: /content/drive/MyDrive/signclip_signit_prolip_finetune
    restore_file: /content/signclip-lis-experiments/pretrained_models/baseline_temporal_checkpoint_best.pt

task_type: sweep_small

model:
  model_cls: MMFusionSeparate
  mm_encoder_cls: null
  video_encoder_cls: MMBertForEncoder
  text_encoder_cls: BertModel
  num_hidden_video_layers: 12
  vfeat_dim: 609

loss:
  loss_cls: MMContraLoss

eval:
  save_path: /content/drive/MyDrive/signclip_signit_prolip_finetune
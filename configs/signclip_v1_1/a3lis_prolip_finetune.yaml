# SignCLIP A3LIS ProLIP Fine-tuning - Local Configuration
#
# ProLIP setup:
# - Train only final visual projector layer (videomlp.linear2)
# - Global 147-way CE against frozen text embeddings
# - Squared-distance regularization to pretrained projector weights

dataset:
  max_video_len: 256
  max_len: 64
  meta_processor: SignCLIPPretrainMetaProcessor
  video_processor: PoseProcessor
  text_processor: TextProcessor
  bert_name: bert-base-cased
  test_path: /home/tharen/MASTERS/vision/project/signclip-lis-experiments/runs/signclip_local/dummy_test.txt
  val_path: /home/tharen/MASTERS/vision/project/signclip-lis-experiments/runs/signclip_local/dummy_val.txt
  train_path: /home/tharen/MASTERS/vision/project/signclip-lis-experiments/runs/signclip_local/dummy_train.txt
  metadata_path: /home/tharen/MASTERS/vision/project/signclip-lis-experiments/runs/signclip_local/dummy_metadata.csv
  vfeat_dir: /home/tharen/MASTERS/vision/project/signclip-lis-experiments/runs/signclip_local
  aligner: DSAligner
  pose_components: 'reduced_face'
  augment_temporal: true

fairseq:
  common:
    fp16: true
    tensorboard_logdir: /home/tharen/MASTERS/vision/project/signclip-lis-experiments/runs/signclip_a3lis_prolip_finetune
    log_interval: 1000
  dataset:
    num_workers: 0
    batch_size: 16
  optimization:
    lr:
    - 2.0e-05
    clip_norm: 1.0
    optimizer: adamw
    adam_betas: (0.9, 0.98)
    lr_scheduler: polynomial_decay
    total_num_update: 1000000
    warmup_updates: 80
    weight_decay: 0.001
    ddp_backend: no_c10d
    max_epoch: 50
    # ProLIP controls consumed by fineTuneA3LISProLIP
    prolip_lambda: 2.0
    prolip_lambda_mode: inv_n
  checkpoint:
    no_epoch_checkpoints: true
    reset_optimizer: true
    reset_dataloader: true
    reset_meters: true
    save_dir: /home/tharen/MASTERS/vision/project/signclip-lis-experiments/runs/signclip_a3lis_prolip_finetune
    restore_file: /home/tharen/MASTERS/vision/project/signclip-lis-experiments/pretrained_models/baseline_temporal_checkpoint_best.pt

task_type: sweep_small

model:
  model_cls: MMFusionSeparate
  mm_encoder_cls: null
  video_encoder_cls: MMBertForEncoder
  text_encoder_cls: BertModel
  num_hidden_video_layers: 12
  vfeat_dim: 609

loss:
  loss_cls: MMContraLoss

eval:
  save_path: /home/tharen/MASTERS/vision/project/signclip-lis-experiments/runs/signclip_a3lis_prolip_finetune
